<!DOCTYPE html>
<html>
<head>
    <title>Temperature Converter</title>


    <style>
                *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body{


    margin-top: 10em;
}
        h2 {
            color: #2721d0;
        }
        .container {
            background: white;
            width: 300px;
            height: 20em;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgb(7, 114, 116);
            display: grid;
            justify-content: center;
            align-items: center;
           


        }


        label{
              margin-left: 1.5em;
        }
        input {
            padding: 8px;
            width: 80%;
            margin-top: 1px;
            font-size: 16px;
            margin-left: 1.5em;
        }
            margin-top: 3px;
            font-weight: bold;
        }
    </style>


</head>
<body>


    <div class="container">
        <h2>Temperature Converter</h2>


        <label>Enter Temperature in Celsius:</label><br>
       
       
        <input type="number" id="celsius" oninput="convertTemp()">
       
        <hr>


        <p>Temperature in Fahrenheit: <span id="fahrenheit">0</span></p>
    </div>


    <script>
        function convertTemp() {
            let c = document.getElementById("celsius").value;
            let f = (c * 9/5) + 32;
            document.getElementById("fahrenheit").innerText = f;
        }
    </script>


</body>
</html>
